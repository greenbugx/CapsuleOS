name: Build (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Prepare zip
        run: |
          mkdir dist
          copy target\release\capsule_os.exe dist\capsule-os.exe
          powershell Compress-Archive -Path dist\* -DestinationPath CapsuleOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CapsuleOS-windows
          path: dist/capsule-os.exe